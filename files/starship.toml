"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$directory$git_branch$git_status\
$rust$python$golang\
$fill\
$cmd_duration$battery$time\
$status
$character
"""

add_newline = true

[fill]
symbol = " "

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[time]
disabled = false
time_format = "%H:%M:%S.%3f"
style = "bold fg:#e0e9cb"
format = '[ $time ]($style)'

[hostname]
disabled = false
ssh_only = true
style = "fg:#a0a9cb"
format = '[ $hostname ]($style)'

[directory]
style = "fg:#e3e5e5"
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "fg:#a0a9cb"
format = "[ $symbol $branch(:$remote_branch) ]($style) "

[git_status]
style = "bold yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[rust]
symbol = ""
style = "fg:#769ff0"
format = '[ $symbol $version ]($style)'

[python]
symbol = "🐍"
style = "fg:#769ff0"
format = '[ $symbol$version ]($style)'

[golang]
symbol = "Go"
style = "fg:#769ff0"
format = '[ $symbol $version ]($style)'

[nodejs]
disabled = true

[battery]
disabled = false
full_symbol = "●"
charging_symbol = "↑"
discharging_symbol = "↓"
format = '[$symbol$percentage ]($style)'
[[battery.display]]
threshold = 30
style = "fg:#ff6b6b"
[[battery.display]]
threshold = 60
style = "fg:#f0a500"
[[battery.display]]
threshold = 90
style = "fg:#a0a9cb"

[status]
style = "fg:#ff6b6b"
format = '[$status]($style)'

[shell]
disabled = true

[custom]
disabled = true

[cmd_duration]
min_time = 1_000
format = "[$duration](bold yellow) "
show_milliseconds = true

