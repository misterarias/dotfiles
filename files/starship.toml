# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$time$hostname$directory$git_branch$git_status\
$rust$python$golang$nodejs$custom\
$battery\
$line_break\
$status$shell$cmd_duration
$character
"""

add_newline = true

[line_break]
disabled = false


[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"


[time]
disabled = false
time_format = "%H:%M:%S.%3f"
style = "fg:#e0e9cb bg:#0d1117"
format = '[$time]($style)'

[hostname]
disabled = false
ssh_only = false
style = "fg:#a0a9cb bg:#11151c"
format = '[ $hostname ]($style)'
aliases = {"LMES-JLY4LRQ7FK" = "McBook"}

[directory]
style = "fg:#e3e5e5 bg:#161b22"
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "fg:#a0a9cb bg:#1c2230"
# format = '[ $symbol $branch ]($style)'
format = "[ $symbol $branch(:$remote_branch) ]($style) "

[git_status]
style = "bold yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[rust]
symbol = ""
style = "fg:#769ff0 bg:#202736"
format = '[ $symbol $version ]($style)'

[python]
symbol = "🐍"
style = "fg:#769ff0 bg:#202736"
format = '[ $symbol$version ]($style)'

[golang]
symbol = "Go"
style = "fg:#769ff0 bg:#202736"
format = '[ $symbol $version ]($style)'

[nodejs]
disabled = true

[battery]
disabled = false
full_symbol = "Full"
charging_symbol = "Charging"
discharging_symbol = "Battery"
format = '[ $symbol $percentage ]($style)'
[[battery.display]]
threshold = 30
style = "fg:#ff6b6b bg:#11151c"

[status]
style = "fg:#ff6b6b"
format = '[$status]($style)'

[shell]
disabled = true

[custom]
disabled = true

[cmd_duration]
min_time = 2_000
format = "[$duration](bold yellow) "
show_milliseconds = false

